root = "."
tmp_dir = "tmp"

[build]
  # Path binary hasil build
  bin = "./tmp/main"
  # Build dari entrypoint package main di cmd/api
  cmd = "go build -o ./tmp/main ./cmd/api"
  # Delay sebelum rebuild (ms)
  delay = 1000
  # Folder yang dikecualikan dari watch
  exclude_dir = ["assets", "tmp", "vendor", "testdata", "bin", "migrations"]
  exclude_file = []
  exclude_regex = ["_test\\.go"]
  exclude_unchanged = false
  follow_symlink = false
  # File yang di-watch
  include_ext = ["go", "tpl", "tmpl", "html"]
  include_dir = []
  include_file = []
  args_bin = []
  kill_delay = "0s"
  log = "build-errors.log"
  poll = false
  poll_interval = 0
  pre_cmd = []
  post_cmd = []
  rerun = false
  rerun_delay = 500
  send_interrupt = false
  stop_on_error = true

[color]
  app     = ""
  build   = "yellow"
  main    = "magenta"
  runner  = "green"
  watcher = "cyan"

[log]
  main_only = false
  silent    = false
  time      = false

[misc]
  clean_on_exit = true

[proxy]
  app_port   = 0
  enabled    = false
  proxy_port = 0

[screen]
  clear_on_rebuild = false
  keep_scroll      = true